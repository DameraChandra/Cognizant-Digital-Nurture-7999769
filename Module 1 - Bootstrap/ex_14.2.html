<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 14.2 - Responsive Sidebar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">

  <div class="row">

    <!-- Sidebar (hidden on mobile, visible md and above) -->
    <div class="col-md-3 bg-dark text-white min-vh-100 d-none d-md-block p-4">

      <h4>Sidebar</h4>

      <ul class="nav flex-column mt-3">
        <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Dashboard</a></li>
        <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Profile</a></li>
        <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Settings</a></li>
        <li class="nav-item mb-2"><a class="nav-link text-white" href="#">Logout</a></li>
      </ul>

    </div>

    <!-- Main Content -->
    <div class="col-12 col-md-9 p-4">

      <h2>Main Content Area</h2>
      <p>
        This sidebar appears only on tablets (md) and larger screens.
        On mobile it is hidden using Bootstrap display utilities.
      </p>

      <div class="alert alert-info">
        Resize screen to see responsive behavior.
      </div>

    </div>

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 9.2 - Button Groups</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

  <h2 class="mb-4">Button Group</h2>

  <!-- Button Group -->
  <div class="btn-group mb-4" role="group">
    <button class="btn btn-primary">Left</button>
    <button class="btn btn-primary">Middle</button>
    <button class="btn btn-primary">Right</button>
  </div>

  <hr>

  <h2 class="mb-4">Toggle Buttons (Checkbox)</h2>

  <!-- Toggle Buttons -->
  <div class="btn-group" role="group">

    <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
    <label class="btn btn-outline-primary" for="check1">Option 1</label>

    <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
    <label class="btn btn-outline-primary" for="check2">Option 2</label>

    <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
    <label class="btn btn-outline-primary" for="check3">Option 3</label>

  </div>

</div>

</body>
</html>

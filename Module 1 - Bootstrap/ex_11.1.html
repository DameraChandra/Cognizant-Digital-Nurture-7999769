<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 11.1 - Profile Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

  <h2 class="mb-4">Profile Card</h2>

  <div class="card" style="width: 300px;">

    <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Profile Image">

    <div class="card-body">

      <h5 class="card-title">John Doe</h5>

      <p class="card-text">
        Web Developer with passion for building responsive and modern web applications.
      </p>

      <a href="#" class="btn btn-primary">View Profile</a>

    </div>

  </div>

</div>

</body>
</html>

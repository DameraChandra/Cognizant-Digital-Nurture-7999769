<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display & Visibility</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

  <h2 class="mb-4">Display Utilities Demo</h2>

  <!-- Hidden on all screens -->
  <div class="p-3 bg-danger text-white d-none mb-3">
    This is d-none 
  </div>

  <!-- Visible only on md and above -->
  <div class="p-3 bg-primary text-white d-none d-md-block mb-3">
    Visible on md  
  </div>

  <!-- Flex only on large screens -->
  <div class="p-3 bg-success text-white d-none d-lg-flex justify-content-between">
    <span>Visible only on large screens</span>
    <span>Flex layout active</span>
  </div>

</div>

</body>
</html>

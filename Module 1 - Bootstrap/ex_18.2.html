<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 18.2 - Accordion</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

  <h2 class="mb-4">Bootstrap Accordion</h2>

  <div class="accordion" id="myAccordion">

    <div class="accordion-item">

      <h2 class="accordion-header">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#item1">
          What is Bootstrap?
        </button>
      </h2>

      <div id="item1" class="accordion-collapse collapse show" data-bs-parent="#myAccordion">
        <div class="accordion-body">
          Bootstrap is a popular CSS framework for building responsive websites.
        </div>
      </div>

    </div>

    <div class="accordion-item">

      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#item2">
          Why use Bootstrap?
        </button>
      </h2>

      <div id="item2" class="accordion-collapse collapse" data-bs-parent="#myAccordion">
        <div class="accordion-body">
          It saves time and provides ready-made responsive components.
        </div>
      </div>

    </div>

    <div class="accordion-item">

      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#item3">
          Is Bootstrap easy?
        </button>
      </h2>

      <div id="item3" class="accordion-collapse collapse" data-bs-parent="#myAccordion">
        <div class="accordion-body">
          Yes, it is beginner-friendly and widely used in web development.
        </div>
      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

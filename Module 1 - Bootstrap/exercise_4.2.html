<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Four Column Layout</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Four Equal Columns
    </h1>

    <div class="row">

        <!-- Column 1 -->
        <div class="col-sm-3">

            <div class="bg-primary text-white p-4 m-2 text-center">
                Column 1
            </div>

        </div>

        <!-- Column 2 -->
        <div class="col-sm-3">

            <div class="bg-success text-white p-4 m-2 text-center">
                Column 2
            </div>

        </div>

        <!-- Column 3 -->
        <div class="col-sm-3">

            <div class="bg-danger text-white p-4 m-2 text-center">
                Column 3
            </div>

        </div>

        <!-- Column 4 -->
        <div class="col-sm-3">

            <div class="bg-warning text-dark p-4 m-2 text-center">
                Column 4
            </div>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 12.2 - Pricing Section</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

  <h2 class="text-center mb-5">Pricing Plans</h2>

  <div class="row text-center">

    <!-- Basic Plan -->
    <div class="col-md-4 mb-4">
      <div class="card p-4 shadow">

        <h4 class="mb-3">Basic</h4>
        <h2 class="mb-3">$9</h2>

        <p class="mb-4">Good for beginners</p>

        <ul class="list-unstyled mb-4">
          <li class="py-1">✔ Feature 1</li>
          <li class="py-1">✔ Feature 2</li>
          <li class="py-1">✔ Support</li>
        </ul>

        <button class="btn btn-outline-primary">Choose Plan</button>

      </div>
    </div>

    <!-- Standard Plan -->
    <div class="col-md-4 mb-4">
      <div class="card p-4 shadow border-primary">

        <h4 class="mb-3">Standard</h4>
        <h2 class="mb-3">$29</h2>

        <p class="mb-4">Most popular</p>

        <ul class="list-unstyled mb-4">
          <li class="py-1">✔ Feature 1</li>
          <li class="py-1">✔ Feature 2</li>
          <li class="py-1">✔ Feature 3</li>
        </ul>

        <button class="btn btn-primary">Choose Plan</button>

      </div>
    </div>

    <!-- Premium Plan -->
    <div class="col-md-4 mb-4">
      <div class="card p-4 shadow">

        <h4 class="mb-3">Premium</h4>
        <h2 class="mb-3">$49</h2>

        <p class="mb-4">Best value</p>

        <ul class="list-unstyled mb-4">
          <li class="py-1">✔ All Features</li>
          <li class="py-1">✔ Priority Support</li>
          <li class="py-1">✔ Unlimited Access</li>
        </ul>

        <button class="btn btn-outline-dark">Choose Plan</button>

      </div>
    </div>

  </div>

</div>

</body>
</html>

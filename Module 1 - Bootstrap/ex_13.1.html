<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 13.1 - Dashboard Colors</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

  <h2 class="mb-4 text-center">Dashboard</h2>

  <div class="row text-center">

    <!-- Card 1 -->
    <div class="col-md-3 mb-3">
      <div class="p-4 bg-primary text-white rounded">
        <h4>Users</h4>
        <p>1200</p>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-md-3 mb-3">
      <div class="p-4 bg-success text-white rounded">
        <h4>Revenue</h4>
        <p>$45K</p>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-md-3 mb-3">
      <div class="p-4 bg-warning text-dark rounded">
        <h4>Alerts</h4>
        <p>5</p>
      </div>
    </div>

    <!-- Card 4 -->
    <div class="col-md-3 mb-3">
      <div class="p-4 bg-danger text-white rounded">
        <h4>Errors</h4>
        <p>2</p>
      </div>
    </div>

  </div>

</div>

</body>
</html>

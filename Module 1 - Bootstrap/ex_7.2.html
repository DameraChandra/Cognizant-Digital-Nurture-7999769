<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 7.2 - Text Transform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container mt-5">

    <p class="text-uppercase">
      this text is uppercase using bootstrap
    </p>

    <p class="text-lowercase">
      THIS TEXT IS LOWERCASE USING BOOTSTRAP
    </p>

    <p class="text-capitalize">
      this text will be capitalized using bootstrap utility class
    </p>

  </div>

</body>
</html>

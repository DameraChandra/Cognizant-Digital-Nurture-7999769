<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Grid System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div class="container mt-5">

    <h1 class="text-center mb-4">
        Bootstrap Grid Example
    </h1>

    <!-- Row Start -->
    <div class="row">

        <!-- Column 1 -->
        <div class="col-md-4">
            <div class="bg-primary text-white p-4">Column 1</div>
        </div>
        <!-- Column 2 -->
        <div class="col-md-4">
            <div class="bg-success text-white p-4">Column 2</div>
        </div>
        <!-- Column 3 -->
        <div class="col-md-4">
            <div class="bg-danger text-white p-4">Column 3</div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Exercise 5.2</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<div class="container mt-5">
    <h1 class="text-center mb-4">Reordering Columns</h1>
    <div class="row">
        <!-- First Column -->
        <div class="col-md-6 order-md-2">
            <div class="bg-primary text-white p-5 text-center">First Column</div>
        </div>
        <!-- Second Column -->
        <div class="col-md-6 order-md-1">
            <div class="bg-success text-white p-5 text-center">
                Second Column
            </div>
        </div>
    </div>
</div>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 11.2 - Media Object</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

  <h2 class="mb-4">Media Object Layout</h2>

  <!-- Media object using flex -->
  <div class="d-flex align-items-start">

    <!-- Image left -->
    <img src="https://picsum.photos/300/200" class="card-img-top" alt="image" width="400" height="400">

    <!-- Content -->
    <div>

      <h5 class="mt-0">Media Heading</h5>

      <p>
        This is a simple media object layout using Bootstrap 5 flex utilities.
        The image is aligned to the left and text flows on the right side.
      </p>

      <p class="text-muted">Posted 2 hours ago</p>

    </div>

  </div>

</div>

</body>
</html>

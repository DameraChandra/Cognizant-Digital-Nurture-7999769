<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 15.1 - Borders & Image</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5 text-center">

  <h2 class="mb-4">Border Utilities with Image</h2>

  <img src="https://picsum.photos/200"
       class="border border-primary border-3 rounded-circle"
       alt="Sample Image">

  <p class="mt-3">Image with border-primary, border-3, and rounded-circle</p>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 7.2 - Card Flex Layout</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card p-3">

    <div class="d-flex justify-content-between align-items-center">

      <div>
        <h5 class="card-title mb-1">Project Dashboard</h5>
        <p class="text-muted mb-0">Updated 2 mins ago</p>
      </div>

      <button class="btn btn-primary">
        View
      </button>

    </div>

    <hr>

    <p class="card-text">
      This layout uses flex utilities to align content and button in one row.
      It keeps proper spacing using justify-content-between and align-items-center.
    </p>

  </div>

</div>

</body>
</html>

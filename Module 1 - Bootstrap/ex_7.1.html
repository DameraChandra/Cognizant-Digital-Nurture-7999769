<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 7.1 - Typography</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="display-1">Display 1 Heading</h1>
    <p class="lead">This is a lead paragraph. It stands out from normal text.</p>
    <p class="text-muted">This text is muted using Bootstrap text-muted class.</p>
    <p class="fw-bold">This text is bold using fw-bold class.</p>
    <p>Normal paragraph for comparison.</p>
    <h2 class="display-4">Display 4 Heading Example</h2>
  </div>
</body>
</html>

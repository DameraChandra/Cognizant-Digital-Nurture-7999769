<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercise 12.1 - Spacing Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

  <!-- Section 1 -->
  <div class="bg-light m-3 p-2">
    <h3>Section 1</h3>
    <p>This section uses m-3 (margin) and p-2 (padding).</p>
  </div>

  <!-- Section 2 -->
  <div class="bg-warning mt-4 py-5 px-3">
    <h3>Section 2</h3>
    <p>This section uses mt-4 and py-5 spacing utilities.</p>
  </div>

  <!-- Section 3 -->
  <div class="bg-info m-4 p-4">
    <h3>Section 3</h3>
    <p>Combined margin and padding example.</p>
  </div>

</div>

</body>
</html>
